<div class="unknown-bug-page">


    <div class="unknown-user-placed">

        <img class="unknown-bug-image" [src]="bug?.picture_url" alt="image" />
        <div class="unknown-bug-text">
            <div class="unknown-username">
                <div> User <span>bugfinder123</span> said:</div>
                <img class="unknown-comment-flag" [src]="'https://flagcdn.com/' + countryCode + '.svg'"
                    alt="countryCode" />

            </div>
            <div class="unknown-comment">
                {{bug?.description}}
            </div>
            <div class="unknown-text-profile">
                <img src="../../assets/profileavatarfemale.png" alt="profile picture" />
            </div>
        </div>
    </div>

    <div class="unknown-community">
        <h1>Comments</h1>

        <div class="unknown-community-comments">

            <div class="comment-cont">
                <textarea class="input-comment" type="text" placeholder="Enter your comment here..." rows="1" cols="50"
                    maxlength="300"></textarea>
                <button class="submit-comment">Comment</button>
            </div>
            @for (comment of bug?.comments; track $index) {
                <app-comment></app-comment>
            }
        </div>

    </div>
</div>
