<div class="unknown-bug-page">


    <div class="unknown-user-placed">

        <img class="unknown-bug-image" [src]="apirul + bug?.picture_url" alt="image" />
        <div class="unknown-bug-text">
            <div class="unknown-username">
                <div class="flex"> User
                    <div class="username-span">{{this.bug?.user?.name}}
                        <div class="user-popup">
                            <div>{{this.bug?.user?.name}}</div>
                            <div>{{this.bug?.user?.surname}}</div>
                            <span>Reputation:{{this.bug?.user?.reputation}}</span>
                        </div>
                    </div> said
                </div>
                <img class="unknown-comment-flag" [src]="'https://flagcdn.com/' + this.bug?.countryCode + '.svg'"
                    alt="countryCode" />

            </div>
            <div class="unknown-comment">
                {{bug?.description}}
            </div>
            <div class="unknown-text-profile">
                @if(this.bug?.user!.gender == "male"){
                <img src="assets/profileavatarmale.png" alt="Male profile avatar" />
                }
                @if(this.bug?.user!.gender == "female"){
                <img src="assets/profileavatarfemale.png" alt="Male profile avatar" />
                }
            </div>
        </div>
    </div>

    <div class="unknown-community">
        <h1>Comments</h1>

        <div class="unknown-community-comments">

            <div class="comment-cont">
                <textarea class="input-comment" type="text" placeholder="Enter your comment here..." rows="1" cols="50"
                    maxlength="300" [(ngModel)]="commentText"></textarea>
                <button class="submit-comment" (click)="handleSubmitComment()">Comment</button>
            </div>
            @for (com of bug?.comments; track $index) {
            <app-comment [comment]=com></app-comment>
            }
        </div>

    </div>
</div>
