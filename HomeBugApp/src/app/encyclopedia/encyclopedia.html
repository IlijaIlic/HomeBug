<div class="hb-encyclopedia-page">

  

    <div class="hb-encyclopedia-title">
        ARTHROPOD ENCYCLOPEDIA
        <p>Insects, spiders, centipedes & other arthropods.</p>
    </div>
    <div class="hb-cont">
        <div class="hb-filters">
            FILTERS
            <button type="button">FILTER1</button>
            <button type="button">FILTER2</button>
            <button type="button">FILTER3</button>
        </div>
        <div class="hb-filt-bugs">
            <div class="hb-applied-filters">
                APPLIED FILTERS:
                <app-applied-filter filter_name="filter1"/>
                <app-applied-filter filter_name="filter2"/>
                <app-applied-filter filter_name="filter3"/>

            </div>
            <div class="hb-bugs-cont">

                @for (kbug of this.kbugs; track $index) {
                <app-unknown-bug-image [country_show]="false" [routerLink]="`known/` + kbug.id" [size]="size_of_comp" [kbug]=kbug [unknown]=true/>
                }
            </div>
            <div class="hb-numeration">
                <button type="button"><</button>
                <button type="button"><<</button>
                <button type="button">1</button>
                <button type="button">2</button>
                ...
                <button type="button">></button>
                <button type="button">>></button>
            </div>
        </div>
    </div>
</div>
