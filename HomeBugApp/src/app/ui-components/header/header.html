<header class="hb-header">
  <div class="hb-header-button-container">
    <button class="hb-logo" routerLink="">
      <img src="assets/newlogo.png" alt="logo" />
    </button>
    <div class="hb-header-links-container">
      <button routerLink="search">Search</button>
      <button routerLink="encyclopedia">BugMap</button>
      <button routerLink="encyclopedia">Encyclopedia</button>
    </div>
    <div class="hb-auth">
      @if (loggedIn) {
      <button class="hb-header-login" routerLink="profile">Profile</button>
      <button class="hb-header-login" routerLink="/" (click)="handleLogout()">Logout</button>
      } @else {
      <button class="hb-header-login" routerLink="login">Login</button>
      <button class="hb-header-register" routerLink="register">Register</button>
      }
    </div>
    <button class="burger-menu" (click)="toggleMenu()" [class.open]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>


  @if (menuOpen == true) {

  <!-- overlay -->
  <div class="hb-overlay" (click)="closeMenu()"></div>

  <!-- mobile menu -->
  <nav class="hb-mobile-menu" [class.open]="menuOpen">
    <button routerLink="search" (click)="closeMenu()">Search</button>
    <button routerLink="encyclopedia" (click)="closeMenu()">Encyclopedia</button>

    <hr>

    @if (loggedIn) {
    <button routerLink="profile" (click)="closeMenu()">Profile</button>
    <button routerLink="profile" (click)="closeMenu()">BugMap</button>
    <button routerLink="/" (click)="closeMenu(); handleLogout()">Logout</button>
    } @else {
    <button routerLink="login" (click)="closeMenu()">Login</button>
    <button routerLink="register" (click)="closeMenu()">Register</button>
    }
  </nav>

  }
  @if (wave_show == true) {
  <svg class="hb-header-wave" viewBox="0 50 900 50" xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1">
    <path
      d="M0 62L30 59C60 56 120 50 180 50C240 50 300 56 360 58.8C420 61.7 480 61.3 540 58.3C600 55.3 660 49.7 720 50.3C780 51 840 58 870 61.5L900 65L900 0L870 0C840 0 780 0 720 0C660 0 600 0 540 0C480 0 420 0 360 0C300 0 240 0 180 0C120 0 60 0 30 0L0 0Z"
      fill="#4D9F71" stroke-linecap="round" stroke-linejoin="miter"></path>
  </svg>
  }


</header>
