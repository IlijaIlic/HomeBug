<div class="comment">
    <div class="rate-section">
        <button (click)="handleLike()" [disabled]="this.disabled"><ng-icon class="icon-up" [class.active]="this.liked" name="featherArrowUp" size="1.5rem"></ng-icon></button>
        <div class="rate-points">{{this.comment.rating}}</div>
        <button (click)="handleDislike()"  [disabled]="this.disabled"><ng-icon class="icon-down" [class.active]="this.disliked" name="featherArrowDown" size="1.5rem"></ng-icon></button>
    </div>
    <div>

        <div class="username">

            <div>{{this.comment.user.name}}</div>
            <div class="user-rating">{{this.reputations[userReputation]}}</div>
        </div>
        <hr>
        <div class="comment-text">
            {{this.comment.text}}
        </div>
    </div>
</div>
